<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EcoData</title>
  <link rel="stylesheet" href="globalStyle.css">
  <link rel="stylesheet" href="signLogin.css">
  <link rel="stylesheet" href="sign.css">




  <style>
    


  .btn-text{
    font-size: .95rem;
    font-weight: 600;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }


  .spinner{
    width: 19px;
    height: 19px;
    border: 3px solid white;
    border-top: 3px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }

  button.loading .spinner{
    display: block;
  }

  button.loading .btn-text{
    display: none;
  }


  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }



  </style>
</head>



<script src="global.js"></script>
<body>


   <div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!----LAPTOP & PHONE UI-UPDATE (9TH-MAY)---->

<div class="signUp-container">
  <!----navbar--->
  <div class="navigation">
    <div class="navigation-left">
      <img src="./css/icons/icon-shortcut.png" alt="" loading="lazy">
    </div>
    <div class="navigaition-right"></div>
  </div>
    <div class="grid-container">



      <!--SIDEBAR-->
      <div class="sidebar">
       <div class="signup-card">
        <div class="logoImg">
          <img src="./css/icons/icon-shortcut.png" alt="" loading="lazy">
          <h1>EcoData</h1>
        </div>
        
        <div class="sign-note">
          Yeah! already have account: 
          <p class="notes">
         Login to your account for faster checkOut. 
          </p>
        </div>
       </div>
      </div>


<!----main-man-->
      <div class="main-main">



        <div class="container">
    <h2>Welcome Back! <br> Please Login to Your Account</h2>



    <form id="login-form">

     <div class="formFillCard">
  <div class="formFillCard-top">
    <label> Email Address</label>
  </div>
  <div class="formFillCard-bottom">
    <div class="formInputCreate">
      <img class="curNone" src="./css/uiIcons/email.png" alt="">
        <input type="email" id="email" placeholder="Email"  />
    </div>
 
  </div>
     </div>





  <div class="formFillCard">
  <div class="formFillCard-top">
    <label>Password</label>
  </div>
  <div class="formFillCard-bottom">
    <div class="formInputCreate">
      <img class="curNone" src="./css/uiIcons/lock.png" alt="" loading="lazy">
      <input  type="password" id="password" placeholder="Choose Password"  />
      <img id="togglePassword" class="curYes" src="./css/uiIcons/eye.png" alt="toggle password">
    </div>
     
  </div>
</div>
    
<div class="already">
 <p> Don't have an account? <button type="button" class="alloginBtn" onclick="window.location.href = 'signUp.html'" >Sign Up</button></p>
</div>
   

      <button class="signUpBtn" id="logBtn" type="submit">
        <span class="spinner"></span>
        <span class="btn-text">Login</span>
      </button>


    </form>



   
  </div>
      </div>
</div>





  

  
  <!-----NAVIGATION- BAR-->







<script type="module" src="signLogin.js">

</script>



<script>

  document.addEventListener("DOMContentLoaded", () => {

  const password = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");

  togglePassword.addEventListener("click", () => {
    const isPassword = password.type === "password";

    // Toggle input type
    password.type = isPassword ? "text" : "password";

    // Toggle icon image
    togglePassword.src = isPassword 
      ? "./css/uiIcons/hide.png" 
      : "./css/uiIcons/eye.png";
  });
  });
</script>



</body>
</html>
