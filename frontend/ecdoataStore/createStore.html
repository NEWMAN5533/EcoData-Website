<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREATE STORE || EcoShop
  </title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
body{
margin: 0;;
}


/* ================= HEADER ================= */
.store-header {
  width: 100%;
  max-width: 390px;
  height: 3.9rem;
  justify-self: center;;
  background: white;
  padding: 1px 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 15px rgba(0,0,0,0.05);
  border-bottom: 1px solid rgb(240, 235, 235);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  overflow: hidden;
  z-index: 99999;
}

.store-header .store-header-top{
  width: 100%;
  height: 4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  padding-top: .2rem;
}


.logo img {
 width: 2.8rem;
 height: 3.2rem;
 margin-top: .3rem;
 -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  outline: none;
  -ms-user-select: none;;
  user-select: none;
}

.logo span {
  font-size: 14px;
  margin: 0;
  color: #28a745;
  font-weight: 500;
}




.underdev{
  width: 100%;
  max-width:  390px;
  justify-self: center;
  height: max-content;
  padding: 1rem;
  background: rgb(223, 217, 217);
  position: relative;
  margin-top: 4.3rem;
}

.underdev h1{
  font-size: 1.1rem;
  font-weight: 700;
  color: rgb(86, 86, 97);
}

.underdev small{
  display: flex;
  font-size: 1rem;
  font-weight: 600;
  color: rgb(167, 86, 32);
  animation: xl 5s ease infinite;
}

@keyframes  xl {
  to {
    transform: translateX(9px);
  }
}



.container{
  width: 100%;
  max-width: 320px;
  height: max-content;
  gap: 1.5rem;
  margin-bottom: 6rem;
  justify-self: center;
  display: flex;
  position: relative;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  margin-top: 1rem;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.container .logo{
  padding: .4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  text-align: center;
  font-weight: 600;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  font-size: 1.1rem;
  border-radius: .4rem;
}

.container h2{
  color: rgb(112, 112, 119);
  font-size: 1.1rem;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

.container p{
  color:  rgb(112, 112, 119);
  font-size: 1.1rem;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

.input-group{
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .3rem;
  padding: .5rem;
  position: relative;
}

.input-group label{
  color:  rgb(112, 112, 119);
  font-weight: 600;
}

.input-group input{
  padding: .3rem 2rem;
  text-align: start;
  justify-content: start;
  display: flex;
  position: relative;
  align-items: start;
  border: 1px solid rgb(228, 223, 223);
  background:  rgb(245, 244, 244);
  border-radius: 2px;
}

.input-group input::placeholder{
opacity: .6;
font-size: .7rem;
font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

.container .btn{
  border: none;
  padding: .6rem 3rem;
  border-radius: 4px;
  background: linear-gradient(135deg, rgb(241, 182, 17),rgb(255, 145, 0));
  color: white;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  font-size: .9rem;
  cursor:pointer;
}


.link-box{
  display: flex;
  flex-direction: column;
  gap: .3rem;
  position: relative;
}

.link-box strong{
  color: rgba(57, 57, 228, 0.678);
  font-size: .8rem;
  font-weight: 500;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

.link-box .copy-btn{
  border: none;
  padding: .3rem 5rem;
  border-radius: .2rem;
  color: rgb(148, 187, 238);
}

.login-link{
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: center;
  position: relative;
  color: rgb(153, 150, 150);
  font-size: .8rem;
}

.login-link .dashboardArena{
  color: rgb(255, 255, 255);
  font-weight: 400;
  margin-left: .3rem;
  font-size: .9rem;
  text-decoration: underline;
  cursor: pointer;
  background: rgba(75, 76, 76, 0.74);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  padding:  0 .7rem;
  box-shadow:  0 2px 6px rgba(231, 229, 229, 0.15);
  border-radius: 4px;
}

a{
  display: flex;
  text-align: center;
  position: relative;
}


.header-actions {
  display: flex;
  position: relative;
}

.header-actions img{
  width: 2rem;
  height: 1.9rem;
}

</style>

<style>
  .foot{
    position: fixed;
    bottom: 0;
    z-index: 99999;
    left: 0;
    right: 0;
    background-color: #fff !important;
  }
</style>
<body>



    <!-- 🏬 MAIN HEADER -->
  <header class="store-header">
    <div class="store-header-top">

        <!-- LOGO -->
    <div class="logo">
    
      <img src="./icons/logoImg.png" alt="" loading="lazy">
    </div>
       <div class="header-actions" style="display: none;">
        <!---menu-icon-->
    <img id="toggleSidebar" src="./icons/menu-icon.png" alt="">
    </div>
    </div>
    <div class="store-header-bottom" style="display: none;">
          <!-- NAVIGATION -->
        
    <nav class="main-nav">

  
    </div>

  </header>

   <div class="underdev">
    <h1>This page is under development</h1>
    <small>coming up soon!</small>
  </div>


  <!---MAIN-CONTAINER-SECTION------>
  <div class="container">
   
    <h2>Create Your Store</h2>
    <p>Start selling Online in a minutes</p>

    <div class="input-group">
      <label>Store Name</label>
      <input type="text" id="storeName" placeholder="e.g Mimi's Shop">
    </div>

    <button class="btn" id="createStoreBtn">Create Store</button>


    <!-----STORE LINK INPUT------>
    <div class="link-box" id="storeLinkBox">
      <strong>Your Store Link:</strong>
      <div id="storeLinkText"></div>
      <button class="copy-btn" id="copyBtn">Copy Link</button>
    </div>  

    <div class="login-link">
      Already have account? 
      <a href="./ownerDashboard.html">
        <span class="dashboardArena" >Dashboard</span>
      </a>
    </div>
  </div>


    <section class="foot">
   <div class="foot-content">
    <div class="cop-right">
        <p style="text-align:center;color:#888;font-size:14px;">© 2026 Ecodata. All rights reserved.
      </p>
    </div>
      <small class="powered">
        
      <strong>Powered by:</strong>   IA E-Business 
    </small>
  
   </div>
  </section>




  <script type="module">
    import { db } from ".firebase.config.js";

    const ECODATA_API_BASE = "https//ecodata-app.onrender.com"

    const API_BASE = `${ECODATA_API_BASE}/api/create-store`

    const btn = document.getElementById("createStoreBtn");
    const linkBox = document.getElementById("storeLinkBox");
    const linkText = document.getElementById("storeLinkText");
    const copyBtn = document.getElementById("copyBtn");


    btn.addEventListener("click", async () => {
      const storeName = document.getElementById("storeName").value.trim();

      if(!storeName){
        alert("Enter store name");
        return;
      }

      const user = auth.currentUser;
      if(!user){
        alert("Please login first");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/create-store`, {
          method: "POST",
          headers: {
            'content-type': "application/json",
          },

          body: JSON.stringify({
            userId: user.uid,
            storeName
          }),
        });

        const data = await res.json();

        if(!data.success){
          alert(data.error);
          return;
        }

        // show link
        linkBox.style.display = "block";
        linkText.textContent = data.storeLink;

        // save storeId
        localStorage.setItem("storeId", data.storeId);
      } catch(err) {
        console.error(err);
        alert("Server error")
      }
    });

    // copy link 
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(linkText.textContent);
      alert("Link copied");
    });

   
  </script>
</body>
</html>
