<div class="container">
  <h2>Create Your Store</h2>

  <form id="storeForm">
    <label>Business Name</label>
    <input type="text" name="businessName" placeholder="Business Name" required>

    <label>Active WhatsApp No.</label>
    <input type="tel" name="whatsapp" placeholder="WhatsApp Number" required>

    <label>Store Logo</label>
    <input type="file" name="logo" accept="image/*" required>

    <label>Active Location</label>
    <input type="text" name="location" placeholder="Location (e.g. Accra, Ghana)">

    <label>According to products</label>
    <select name="storeType" required>
      <option value="">Select Store Type</option>
      <option value="fashion">Fashion</option>
      <option value="electronics">Electronics</option>
      <option value="food">Food</option>
      <option value="general">General</option>
    </select>

    <button type="submit">Create Store </button>

  </form>


    <div class="success" style="display: none;"> Store Created Successfully</div>

    <div class="link-box">
      <input type="text" id="storeLink" readonly>
      <button type="button" class="copy-btn" onclick="copyLink()">Copy</button>
    </div>

  </div>

</div>






 <script>
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";


// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyClNBlfigtQk8AZWdMZcU9sEtVcIrS0D1g",
  authDomain: "ecodata-2bee6.firebaseapp.com",
  projectId: "ecodata-2bee6",
  storageBucket: "ecodata-2bee6.firebasestorage.app",
  messagingSenderId: "544837123249",
  appId: "1:544837123249:web:6c362350a00c6dab10b690"
};


// 🔹 Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


const form = document.getElementById("storeForm");
const resultBox = document.getElementById("resultBox");
const storeLinkInput = document.getElementById("storeLink");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  try {
    const res = await fetch("/api/store/create-store", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if(data.storeId){
      window.location.href = `/ecdoataStore/subscriptionPage.html?store=${data.storeId}`;
    }

  } catch(err){
    console.error(err);
    alert("Server error");
  }
});

function copyLink(){
  storeLinkInput.select();
  document.execCommand("copy");
  alert("Link copied!");
}





// POST TO ROUTER
async function subscribe(plan){

  const storeId = new URLSearchParams(window.location.search).get("store");

  if(!storeId){
    alert("Store not found");
    return;
  }

  
  const user = auth.currentUser;
  const userEmail = user?.email || `${storeId}@ecodata.com`;
  const userName = user?.displayName || "Guest User";

  try {
    const res = await fetch("/api/subscription/initiate-subscription", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: userEmail, // 🔥 later from Firebase
        storeId,
        plan
      })
    });

    const data = await res.json();

    // ✅ FREE PLAN
    if(data.free){
      window.location.href = `/dashboard.html?store=${storeId}`;
      return;
    }

    // 💰 PAID PLAN
    if(data.paymentUrl){
      window.location.href = data.paymentUrl;
    }

  } catch(err){
    console.error(err);
    alert("Something went wrong");
  }
}

</script>
