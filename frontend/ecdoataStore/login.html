<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EcoData</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="globalStyle.css">
  <link rel="stylesheet" href="signUpStyle.css">

</head>
<body>

  <!-----NAVIGATION- BAR-->
  
<nav class="navbar">
<div class="nav-left">
 <h3>Login</h3>
</div>


</nav>


<section class="top-bg">
  <div class="hero-logo">
    <img src="./icons/logoImg.png" alt="" loading="lazy">
  </div>
</section>


  <div class="container">
    <h2>Welcome Back! <br> Please Login to Your Account</h2>



    <form id="login-form">

     <div class="formFillCard">
  <div class="formFillCard-top">
    <label> Email Address</label>
  </div>
  <div class="formFillCard-bottom">
   <input class="formInputCreate" type="email" id="email" placeholder="Email" required />
  </div>
     </div>


  <div class="formFillCard">
  <div class="formFillCard-top">
    <label>Password</label>
  </div>
  <div class="formFillCard-bottom">
      <input class="formInputCreate" type="password" id="password" placeholder="Choose Password" required />
  </div>
</div>
    
<div class="already">
 <p>Already have an account? <button class="alloginBtn" onclick="window.location.href = 'signup.html'" >Sign Up</button></p>
</div>
   

      <button class="signUpBtn" id="logBtn" type="submit">
        <span class="spinner"></span>
        <span class="btn-text">Login</span>
      </button>


    </form>



   
  </div>

 
<!----SNACKBAR-SECTION----->
  








<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";


// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyClNBlfigtQk8AZWdMZcU9sEtVcIrS0D1g",
  authDomain: "ecodata-2bee6.firebaseapp.com",
  projectId: "ecodata-2bee6",
  storageBucket: "ecodata-2bee6.firebasestorage.app",
  messagingSenderId: "544837123249",
  appId: "1:544837123249:web:6c362350a00c6dab10b690"
};


// 🔹 Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔹 Display username when logged in
onAuthStateChanged(auth, async (user) => {

  const usernameDisplay = document.getElementById("usernameDisplay");
  if (!usernameDisplay) return;

  if (user) {

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (userDoc.exists()) {
      const userData = userDoc.data();
      usernameDisplay.textContent = `Welcome, ${userData.username}!`;
    } else {
      usernameDisplay.textContent = "Welcome!";
    }

  } else {
    usernameDisplay.textContent = "Welcome, Guest!";
  }

});


// 🔹 Login
const loginForm = document.getElementById("login-form");
const logBtn = document.getElementById("logBtn");

loginForm.addEventListener("submit", async (e) => {

  e.preventDefault();
  logBtn.classList.add("loading");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (!userDoc.exists()) {
      showSnackBar("User profile not found.", "error");
      logBtn.classList.remove("loading");
      return;
    }

    const userData = userDoc.data();

    // Save locally
    localStorage.setItem("username", userData.username || "User");
    localStorage.setItem("role", userData.role || "user");

    showSnackBar("Login successful!", "success");

    // 🔥 Redirect based on role
    setTimeout(() => {



    }, 3500);

  } catch (error) {

    showSnackBar(error.message, "error");

  }

  logBtn.classList.remove("loading");

});



/* ============================= */
/*        SNACKBAR SYSTEM        */
/* ============================= */

let snackbarTimeout = null;

function showSnackBar(message, type = "info", duration = 4000) {

  let snackbar = document.querySelector(".snackbar");

  if (!snackbar) {

    snackbar = document.createElement("div");
    snackbar.className = "snackbar";

    snackbar.innerHTML = `
      <span class="snackbar-text"></span>
      <div class="snackbar-progress"></div>
    `;

    document.body.appendChild(snackbar);

  }

  snackbar.querySelector(".snackbar-text").textContent = message;

  if (type === "success") snackbar.style.background = "rgba(7,29,26,0.95)";
  else if (type === "error") snackbar.style.background = "#dc3545";
  else if (type === "warning") snackbar.style.background = "#ffc107";
  else snackbar.style.background = "rgba(7,29,26,0.95)";

  const progress = snackbar.querySelector(".snackbar-progress");

  progress.style.animation = "none";
  void progress.offsetWidth;

  progress.style.animation = `snackbar-progress ${duration}ms linear forwards`;

  snackbar.classList.add("show");

  if (snackbarTimeout) clearTimeout(snackbarTimeout);

  snackbarTimeout = setTimeout(() => {
    snackbar.classList.remove("show");
  }, duration);

}

</script>





</body>
</html>
